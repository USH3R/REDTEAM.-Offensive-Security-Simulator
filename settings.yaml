# ==========================================
# Red Team Simulator - Global Settings
# ==========================================

# Set to True for Hackathon/Demo mode (No real scanning)
# Set to False for actual Network Scanning
simulation_mode: True

# General Scan Configuration
scan_timeout: 2
max_retries: 3

# Port list to check when simulation_mode is False
ports:
  - 22
  - 80
  - 443
  - 3306
  - 8080

# Module Toggle
modules:
  enable_brute_force: True
  enable_injection_checks: True
